<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Métodos de números</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="min-h-screen bg-slate-100 text-slate-900 font-sans">
    <main class="mx-auto flex min-h-screen w-full max-w-2xl items-center justify-center px-4 py-10">
        <section class="w-full rounded-3xl bg-white p-8 shadow-xl shadow-slate-200">
            <div class="mb-8 text-center">
                <p class="text-sm uppercase tracking-[0.35em] text-cyan-600">Métodos</p>
                <h1 class="mt-3 text-3xl font-semibold text-slate-900">Identificación de número</h1>
                <p class="mt-2 text-slate-500">Ingresa un número y revisa si es par, impar o primo.</p>
                <div class="mt-6 flex justify-center">
                    <a href="index.html" class="rounded-full bg-cyan-600 px-5 py-2 text-sm font-semibold text-white transition hover:bg-cyan-700">Ir a Calculadora</a>
                </div>
            </div>

            <form action="#" class="space-y-6">
                <label class="flex flex-col gap-2 text-sm font-medium text-slate-700" for="numero">
                    Número
                    <input id="numero" type="number" min="0" placeholder="Ej. 3" required class="rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 text-slate-900 outline-none transition focus:border-cyan-500 focus:ring-2 focus:ring-cyan-100" />
                </label>

                <div class="grid gap-3 sm:grid-cols-3">
                    <button id="btn-todo" type="button" class="rounded-2xl bg-slate-800 px-4 py-3 text-sm font-semibold text-white transition hover:bg-slate-900">Calcular</button>
                </div>

                <div class="rounded-3xl border border-slate-200 bg-slate-50 p-4 text-center text-lg font-medium text-slate-700 shadow-sm">
                    <p id="resultado" class="min-h-[3rem] text-2xl text-slate-900"></p>
                </div>
            </form>
        </section>
    </main>

    <script src="metodos.js"></script>
    <script src="operaciones.js"></script>
</body>
</html>
