<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculadora</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="min-h-screen bg-slate-100 text-slate-900 font-sans">
    <main class="mx-auto flex min-h-screen w-full max-w-xl items-center justify-center px-4 py-10">
        <section class="w-full rounded-3xl bg-white p-8 shadow-xl shadow-slate-200">
            <div class="mb-8 text-center">
                <p class="text-sm uppercase tracking-[0.35em] text-cyan-600">Proyecto</p>
                <h1 class="mt-3 text-3xl font-semibold text-slate-900">Calculadora</h1>
                <p class="mt-2 text-slate-500">Operaciones básicas con dos números.</p>
                <div class="mt-6 flex justify-center">
                    <a href="metodos.html" class="rounded-full bg-cyan-600 px-5 py-2 text-sm font-semibold text-white transition hover:bg-cyan-700">Ir a Métodos</a>
                    <a href="productos.html" class="ml-4 rounded-full bg-emerald-600 px-5 py-2 text-sm font-semibold text-white transition hover:bg-emerald-700">Ir a Productos</a>
                </div>
            </div>

            <form action="#" class="space-y-6">
                <div class="grid gap-4 sm:grid-cols-2">
                    <label class="flex flex-col gap-2 text-sm font-medium text-slate-700" for="numero_1">
                        Número 1
                        <input id="numero_1" type="number" name="num1" placeholder="Ingresa un número" required class="rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 text-slate-900 outline-none transition focus:border-cyan-500 focus:ring-2 focus:ring-cyan-100" />
                    </label>
                    <label class="flex flex-col gap-2 text-sm font-medium text-slate-700" for="numero_2">
                        Número 2
                        <input id="numero_2" type="number" name="num2" placeholder="Ingresa un número" required class="rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 text-slate-900 outline-none transition focus:border-cyan-500 focus:ring-2 focus:ring-cyan-100" />
                    </label>
                </div>

                <div class="rounded-3xl border border-slate-200 bg-slate-50 p-4 text-center text-lg font-medium text-slate-700 shadow-sm">
                    <p id="resultado" class="mt-2 text-2xl text-slate-900"></p>
                </div>

                <div class="grid gap-3 sm:grid-cols-2">
                    <button id="sumar" type="button" class="rounded-2xl bg-cyan-600 px-4 py-3 text-sm font-semibold text-white transition hover:bg-cyan-700">Sumar</button>
                    <button id="restar" type="button" class="rounded-2xl bg-slate-800 px-4 py-3 text-sm font-semibold text-white transition hover:bg-slate-900">Restar</button>
                    <button id="multiplicar" type="button" class="rounded-2xl bg-emerald-600 px-4 py-3 text-sm font-semibold text-white transition hover:bg-emerald-700">Multiplicar</button>
                    <button id="dividir" type="button" class="rounded-2xl bg-amber-500 px-4 py-3 text-sm font-semibold text-white transition hover:bg-amber-600">Dividir</button>
                </div>
            </form>
        </section>
    </main>

    <script src="operaciones.js"></script>
    <script src="funciones.js"></script>
</body>
</html>
